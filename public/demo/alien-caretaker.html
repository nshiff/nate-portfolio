<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Caretaker</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d14;
            --surface: #16161f;
            --surface2: #1e1e2a;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f0f0f8;
            --text-muted: #a8a8c0;
            --accent: #a78bfa;
            --accent2: #f472b6;
            --green: #34d399;
            --yellow: #fbbf24;
            --red: #f87171;
            --radius: 16px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .device {
            width: 100%;
            max-width: 380px;
            background: var(--surface);
            border-radius: 32px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .device-header {
            padding: 1.25rem 1.5rem 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .app-title {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--accent);
        }

        .pause-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            transition: border-color 0.15s, background 0.15s;
        }

        .pause-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .screen {
            background: #0a0a10;
            margin: 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .screen-scanlines {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.012) 2px,
                    rgba(255, 255, 255, 0.012) 4px);
            pointer-events: none;
            border-radius: var(--radius);
        }

        .pet-svg {
            width: 150px;
            height: 150px;
            transition: transform 0.3s ease;
        }

        .pet-svg.bounce {
            animation: bounce 0.4s ease;
        }

        .pet-svg.shake {
            animation: shake 0.4s ease;
        }

        .pet-svg.sleeping {
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-18px);
            }

            70% {
                transform: translateY(-8px);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        @keyframes sway {

            0%,
            100% {
                transform: rotate(-4deg);
            }

            50% {
                transform: rotate(4deg);
            }
        }

        .zzz {
            position: absolute;
            top: 20px;
            right: 60px;
            font-size: 18px;
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            opacity: 0;
            animation: floatZ 2s ease-in-out infinite;
        }

        .zzz:nth-child(2) {
            animation-delay: 0.7s;
            font-size: 14px;
            top: 30px;
            right: 45px;
        }

        .zzz:nth-child(3) {
            animation-delay: 1.4s;
            font-size: 10px;
            top: 40px;
            right: 35px;
        }

        @keyframes floatZ {
            0% {
                opacity: 0;
                transform: translate(0, 0);
            }

            30% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translate(10px, -20px);
            }
        }

        .message-area {
            margin: 0 1rem;
            background: var(--surface2);
            border-radius: 10px;
            border: 1px solid var(--border);
            padding: 0.6rem 1rem;
            min-height: 42px;
            display: flex;
            align-items: center;
        }

        .message-text {
            font-size: 15px;
            color: var(--text);
            line-height: 1.4;
            font-style: italic;
            transition: opacity 0.3s;
        }

        .message-text.flash {
            animation: flashMsg 0.3s ease;
        }

        @keyframes flashMsg {
            0% {
                opacity: 0;
                transform: translateY(4px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stats {
            padding: 0.875rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-label {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            width: 58px;
            flex-shrink: 0;
        }

        .stat-track {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease, background 0.5s ease;
        }

        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            width: 34px;
            text-align: right;
            flex-shrink: 0;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 0 1rem 1.25rem;
        }

        .action-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.7rem 0.5rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            text-decoration: none;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        .action-btn .icon {
            font-size: 20px;
            line-height: 1;
        }

        .action-btn .btn-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .device-footer {
            padding: 0.75rem 1rem 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reset-btn {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 10px;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .reset-btn:hover {
            color: var(--red);
            border-color: var(--red);
        }

        .confirm-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 0.75rem 1rem 1rem;
            border-top: 1px solid var(--border);
        }

        .confirm-bar.visible {
            display: flex;
        }

        .confirm-bar span {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }

        .confirm-bar .confirm-yes {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            background: none;
            border: 1px solid var(--red);
            color: var(--red);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
        }

        .confirm-bar .confirm-no {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.sleeping {
            background: var(--accent);
        }

        .status-dot.critical {
            background: var(--red);
            animation: pulse 0.6s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }
    </style>
</head>

<body>

    <div class="device">
        <div class="device-header">
            <span class="app-title" id="appTitle">Alien Caretaker</span>
            <button class="pause-btn" id="btnPause" onclick="togglePause()">⏸️</button>
        </div>

        <div class="screen" id="screen">
            <div class="screen-scanlines"></div>
            <svg class="pet-svg" id="petSvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
            <span class="zzz" id="z1" style="display:none">z</span>
            <span class="zzz" id="z2" style="display:none">z</span>
            <span class="zzz" id="z3" style="display:none">z</span>
        </div>

        <div class="message-area">
            <div style="width:100%;">
                <span class="message-text" id="msgText">Loading...</span>
                <div
                    style="margin-top:6px; height:2px; background:rgba(255,255,255,0.07); border-radius:1px; overflow:hidden;">
                    <div id="cooldownBar" style="height:100%; width:0%; background:var(--accent); border-radius:1px;">
                    </div>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-row">
                <span class="stat-label">Hunger</span>
                <div class="stat-track">
                    <div class="stat-fill" id="hungerBar"></div>
                </div>
                <span class="stat-value" id="hungerVal">--</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Happy</span>
                <div class="stat-track">
                    <div class="stat-fill" id="happyBar"></div>
                </div>
                <span class="stat-value" id="happyVal">--</span>
            </div>
        </div>

        <div class="actions">
            <button class="action-btn" id="btnFeed" onclick="doAction('feed')">
                <span class="icon">🍎</span>
                <span class="btn-label">Feed</span>
            </button>
            <button class="action-btn" id="btnPlay" onclick="doAction('play')">
                <span class="icon">🎮</span>
                <span class="btn-label">Play</span>
            </button>
            <button class="action-btn" id="btnSleep" onclick="doAction('sleep')">
                <span class="icon" id="sleepIcon">💤</span>
                <span class="btn-label" id="sleepLabel">Sleep</span>
            </button>
        </div>

        <div class="device-footer" id="deviceFooter">
            <button class="reset-btn" onclick="showConfirm()">New pet</button>
            <div class="status-dot" id="statusDot"></div>
        </div>

        <div class="confirm-bar" id="confirmBar">
            <span>Release into the cosmos?</span>
            <div style="display:flex;gap:6px;">
                <button class="confirm-no" onclick="hideConfirm()">Cancel</button>
                <button class="confirm-yes" onclick="confirmReset()">Yes</button>
            </div>
        </div>
    </div>

    <script>
        // ─── Constants ───────────────────────────────────────────────────────────────

        // How many seconds between automatic game ticks (stat decay + message update)
        const TICK_SECONDS = 10;

        // Stat decay and restore rates are expressed per in-game hour.
        // Since there's no real-time persistence, these only affect the live session's
        // tick-driven decay — each tick nudges stats down by a small fixed amount.
        const DECAY_RATE_PER_HOUR = 8;
        const SLEEP_RESTORE_PER_HOUR = 12;

        // Shared cooldown (in seconds) applied to Feed and Play after either is used.
        const ACTION_COOLDOWN_SECONDS = 5;

        // ─── Data: names, palettes, trait options ────────────────────────────────────

        // One name per letter of the alphabet. Selected deterministically from the pet's
        // seed so the same seed always produces the same name + appearance combination.
        const NAMES = [
            'Aelx', 'Brix', 'Cyvn', 'Dorx', 'Ezvl', 'Fynx', 'Glyx', 'Hroz',
            'Ixvn', 'Jyrb', 'Kluv', 'Lyrz', 'Myvx', 'Nolx', 'Oxvr', 'Pylx',
            'Qyrn', 'Rvox', 'Syxl', 'Tyvz', 'Ulvx', 'Vryn', 'Wylx', 'Xorv',
            'Yzvn', 'Zyx'
        ];

        // Each palette defines a body color, an accent color (antennae tips, spots),
        // and a spot/marking color. Curated so every combo looks intentional.
        const PALETTES = [
            { body: '#a78bfa', accent: '#f472b6', spot: '#fbbf24' },
            { body: '#34d399', accent: '#60a5fa', spot: '#f472b6' },
            { body: '#f87171', accent: '#fbbf24', spot: '#a78bfa' },
            { body: '#60a5fa', accent: '#34d399', spot: '#f472b6' },
            { body: '#fb923c', accent: '#a78bfa', spot: '#34d399' },
            { body: '#e879f9', accent: '#34d399', spot: '#fbbf24' },
        ];

        // The five visual trait axes. Each is selected via the seeded RNG so the same
        // seed always generates the same alien. Name and palette (defined above) are
        // also seeded, multiplying the total combinations further.
        const BODY_SHAPES = ['hex', 'circle', 'square', 'diamond'];
        const ANTENNA_STYLES = ['dual', 'single', 'droopy', 'none'];
        const EYE_STYLES = ['round', 'dot', 'oval', 'slit'];
        const LIMB_CONFIGS = ['full', 'arms', 'blob'];
        const SPOT_PATTERNS = ['dots', 'stripe', 'none'];

        // ─── Message pools ───────────────────────────────────────────────────────────

        // Flavor text shown in the message area. {name} is replaced at runtime with
        // the pet's generated name (e.g. "Xorv munches happily.").
        const MESSAGES = {
            happy: [
                "{name} is feeling great today!",
                "{name} does a little spin of joy.",
                "{name} blinks slowly. Content.",
                "{name} hums in a frequency you can almost hear.",
            ],
            hungry: [
                "{name}'s stomach makes a strange sound.",
                "{name} stares at you meaningfully.",
                "{name} is getting peckish.",
                "Feed me, says {name}'s expression.",
            ],
            sad: [
                "{name} seems a little lonely.",
                "{name} droops slightly.",
                "{name} wants to play.",
                "{name} sighs in three dimensions.",
            ],
            critical: [
                "{name} is not doing well...",
                "{name} flickers faintly.",
                "Please... {name} needs you.",
            ],
            sleeping: [
                "{name} is recharging.",
                "{name} dreams of distant nebulae.",
                "Soft snoring from {name}.",
                "{name} sleeps deeply.",
            ],
            fed: [
                "{name} munches happily.",
                "Delicious, {name} implies.",
                "{name}'s glow brightens a bit.",
            ],
            played: [
                "{name} bounces with delight!",
                "That was fun, {name} signals.",
                "{name} is energized!",
            ],
            woke: [
                "{name} stirs and blinks awake.",
                "{name} is refreshed.",
                "Good morning, {name}!",
            ],
        };

        // ─── Seeded RNG ──────────────────────────────────────────────────────────────

        // A simple LCG (linear congruential generator) seeded with an integer.
        // Returns a closure that produces a new pseudo-random float [0, 1) each call.
        // Using a seeded RNG (rather than Math.random) ensures the same seed always
        // produces the same sequence of trait selections.
        function seededRand(seed) {
            let s = seed;
            return function () {
                s = (s * 1664525 + 1013904223) & 0xffffffff;
                return (s >>> 0) / 0xffffffff;
            };
        }

        function pick(arr, rand) { return arr[Math.floor(rand() * arr.length)]; }

        // ─── Trait generation ────────────────────────────────────────────────────────

        // Derives all visual traits deterministically from a single integer seed.
        // Calling this with the same seed always produces the same alien.
        function generateTraits(seed) {
            const rand = seededRand(seed);
            return {
                name: NAMES[Math.floor(rand() * NAMES.length)],
                palette: PALETTES[Math.floor(rand() * PALETTES.length)],
                bodyShape: pick(BODY_SHAPES, rand),
                antennaStyle: pick(ANTENNA_STYLES, rand),
                eyeStyle: pick(EYE_STYLES, rand),
                limbConfig: pick(LIMB_CONFIGS, rand),
                spotPattern: pick(SPOT_PATTERNS, rand),
            };
        }

        // ─── SVG rendering helpers ───────────────────────────────────────────────────

        // Each function below returns an SVG string fragment for one part of the alien.
        // All coordinates are in a 100×100 viewBox. Fragments are concatenated in
        // renderPet() with deliberate z-order: antennae → limbs → body → details → face.

        function bodyPath(shape) {
            if (shape === 'hex') return `<polygon points="50,18 72,31 72,69 50,82 28,69 28,31" fill="BODY" stroke="none"/>`;
            if (shape === 'circle') return `<circle cx="50" cy="50" r="28" fill="BODY"/>`;
            if (shape === 'square') return `<rect x="22" y="22" width="56" height="56" rx="10" fill="BODY"/>`;
            if (shape === 'diamond') return `<polygon points="50,18 78,50 50,82 22,50" fill="BODY"/>`;
        }

        // A slightly lighter inner shape gives the body a layered, dimensional look.
        function innerBodyPath(shape) {
            if (shape === 'hex') return `<polygon points="50,26 64,34 64,66 50,74 36,66 36,34" fill="INNER"/>`;
            if (shape === 'circle') return `<circle cx="50" cy="50" r="19" fill="INNER"/>`;
            if (shape === 'square') return `<rect x="30" y="30" width="40" height="40" rx="7" fill="INNER"/>`;
            if (shape === 'diamond') return `<polygon points="50,27 72,50 50,73 28,50" fill="INNER"/>`;
        }

        function antennaeSvg(style, color, accent) {
            if (style === 'none') return '';
            if (style === 'dual') return `
    <line x1="38" y1="21" x2="28" y2="6" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="27" cy="4" r="4" fill="${accent}"/>
    <line x1="62" y1="21" x2="72" y2="6" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="73" cy="4" r="4" fill="${accent}"/>`;
            if (style === 'single') return `
    <line x1="50" y1="18" x2="50" y2="4" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="50" cy="2" r="4" fill="${accent}"/>`;
            if (style === 'droopy') return `
    <path d="M38,21 Q24,10 20,20" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="19" cy="21" r="3.5" fill="${accent}"/>
    <path d="M62,21 Q76,10 80,20" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="81" cy="21" r="3.5" fill="${accent}"/>`;
        }

        // Eye shape is fixed per pet, but expression shifts with mood:
        // sleeping → closed lines, sad/critical → compressed vertically, happy → full size.
        function eyesSvg(style, mood) {
            const isSleeping = mood === 'sleeping';
            if (isSleeping) {
                return `<line x1="37" y1="46" x2="43" y2="46" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <line x1="57" y1="46" x2="63" y2="46" stroke="#fff" stroke-width="2" stroke-linecap="round"/>`;
            }
            const isSad = mood === 'sad' || mood === 'critical';
            if (style === 'round') return `
    <ellipse cx="40" cy="46" rx="6" ry="${isSad ? 5 : 7}" fill="#0d0d14"/>
    <circle cx="40" cy="${isSad ? 44 : 43}" r="2.5" fill="white"/>
    <ellipse cx="60" cy="46" rx="6" ry="${isSad ? 5 : 7}" fill="#0d0d14"/>
    <circle cx="60" cy="${isSad ? 44 : 43}" r="2.5" fill="white"/>`;
            if (style === 'dot') return `
    <circle cx="40" cy="46" r="${isSad ? 4 : 5}" fill="#0d0d14"/>
    <circle cx="41" cy="44" r="1.5" fill="white"/>
    <circle cx="60" cy="46" r="${isSad ? 4 : 5}" fill="#0d0d14"/>
    <circle cx="61" cy="44" r="1.5" fill="white"/>`;
            if (style === 'oval') return `
    <ellipse cx="40" cy="46" rx="7" ry="${isSad ? 4 : 5}" fill="#0d0d14"/>
    <circle cx="38" cy="${isSad ? 45 : 44}" r="2" fill="white"/>
    <ellipse cx="60" cy="46" rx="7" ry="${isSad ? 4 : 5}" fill="#0d0d14"/>
    <circle cx="58" cy="${isSad ? 45 : 44}" r="2" fill="white"/>`;
            if (style === 'slit') return `
    <ellipse cx="40" cy="46" rx="6" ry="${isSad ? 2 : 4}" fill="#0d0d14"/>
    <ellipse cx="60" cy="46" rx="6" ry="${isSad ? 2 : 4}" fill="#0d0d14"/>`;
        }

        // Mouth shape is purely mood-driven (not a persistent trait).
        function mouthSvg(mood) {
            if (mood === 'sleeping') return `<line x1="44" y1="59" x2="56" y2="59" stroke="#ffffff60" stroke-width="1.5" stroke-linecap="round"/>`;
            if (mood === 'happy') return `<path d="M43,57 Q50,65 57,57" fill="none" stroke="#ffffff90" stroke-width="2" stroke-linecap="round"/>`;
            if (mood === 'sad' || mood === 'critical') return `<path d="M43,63 Q50,56 57,63" fill="none" stroke="#ffffff70" stroke-width="2" stroke-linecap="round"/>`;
            return `<line x1="44" y1="59" x2="56" y2="59" stroke="#ffffff60" stroke-width="1.5" stroke-linecap="round"/>`;
        }

        // 'full' = arms + legs, 'arms' = arms only, 'blob' = no limbs.
        function limbsSvg(config, color) {
            if (config === 'blob') return '';
            const arms = `
    <path d="M28,48 Q18,44 14,52" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"/>
    <circle cx="12" cy="53" r="5" fill="${color}"/>
    <path d="M72,48 Q82,44 86,52" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"/>
    <circle cx="88" cy="53" r="5" fill="${color}"/>`;
            if (config === 'arms') return arms;
            return arms + `
    <path d="M41,82 Q38,90 34,93" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="33" cy="95" rx="6" ry="3" fill="${color}"/>
    <path d="M59,82 Q62,90 66,93" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="67" cy="95" rx="6" ry="3" fill="${color}"/>`;
        }

        function spotsSvg(pattern, color) {
            if (pattern === 'none') return '';
            if (pattern === 'dots') return `
    <circle cx="50" cy="55" r="3" fill="${color}" opacity="0.6"/>
    <circle cx="43" cy="62" r="2" fill="${color}" opacity="0.45"/>
    <circle cx="57" cy="62" r="2" fill="${color}" opacity="0.45"/>`;
            if (pattern === 'stripe') return `
    <line x1="38" y1="50" x2="62" y2="50" stroke="${color}" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="40" y1="56" x2="60" y2="56" stroke="${color}" stroke-width="2" opacity="0.35" stroke-linecap="round"/>`;
        }

        // Assembles all SVG fragments into the final alien illustration.
        // Rendered in z-order so limbs appear behind the body, face appears on top.
        function renderPet(traits, mood) {
            const { palette, bodyShape, antennaStyle, eyeStyle, limbConfig, spotPattern } = traits;
            const innerColor = lighten(palette.body);
            let svg = antennaeSvg(antennaStyle, palette.body, palette.accent);
            svg += limbsSvg(limbConfig, palette.body);
            svg += bodyPath(bodyShape).replace('BODY', palette.body);
            svg += innerBodyPath(bodyShape).replace('INNER', innerColor);
            svg += spotsSvg(spotPattern, palette.spot);
            svg += eyesSvg(eyeStyle, mood);
            svg += mouthSvg(mood);
            return svg;
        }

        // Mixes a hex color 40% toward white, used for the inner body highlight.
        function lighten(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const mix = (c) => Math.min(255, Math.round(c + (255 - c) * 0.4));
            return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
        }

        // ─── Game logic ──────────────────────────────────────────────────────────────

        // Derives the current mood from game state. Mood drives facial expression,
        // message category, and the status dot color in the footer.
        function getMood(state) {
            if (state.sleeping) return 'sleeping';
            const min = Math.min(state.hunger, state.happiness);
            if (min < 20) return 'critical';
            if (state.hunger < 35) return 'hungry';
            if (state.happiness < 35) return 'sad';
            return 'happy';
        }

        // Picks a random message from the given category and substitutes the pet's name.
        function pickMessage(category) {
            const arr = MESSAGES[category];
            const template = arr[Math.floor(Math.random() * arr.length)];
            return template.replace(/\{name\}/g, traits ? traits.name : 'Zyx');
        }

        // Returns a CSS color string representing the health of a stat value (0–100).
        // Green → yellow → red as the value drops.
        function statColor(val) {
            if (val > 60) return '#34d399';
            if (val > 30) return '#fbbf24';
            return '#f87171';
        }

        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

        // ─── State ───────────────────────────────────────────────────────────────────

        // Both are set by newPet() before anything else runs.
        let state = null;
        let traits = null;
        let paused = false;

        // Initializes a fresh pet with a random seed. The seed is stored on state so
        // it can be displayed as part of the pet's unique identifier (e.g. "Xorv-325").
        function newPet() {
            const seed = Math.floor(Math.random() * 0xffffffff);
            traits = generateTraits(seed);
            state = {
                seed,
                hunger: 80,
                happiness: 50,
                sleeping: false,
                daysAlive: 1,
                born: Date.now(),
            };
            lastActionTime = 0;
        }

        // ─── UI helpers ──────────────────────────────────────────────────────────────

        // Toggles the paused flag and updates the button icon.
        // While paused, stepCooldown still runs but skips ticks and freezes the bar.
        function togglePause() {
            paused = !paused;
            document.getElementById('btnPause').textContent = paused ? '▶️' : '⏸️';
            if (!paused) startCooldown(); // reset bar so elapsed time while paused doesn't trigger an instant tick
            render();
        }

        // Swaps the footer for an inline confirmation bar to avoid browser confirm().
        function showConfirm() {
            document.getElementById('deviceFooter').style.display = 'none';
            document.getElementById('confirmBar').classList.add('visible');
        }

        function hideConfirm() {
            document.getElementById('deviceFooter').style.display = 'flex';
            document.getElementById('confirmBar').classList.remove('visible');
        }

        function confirmReset() {
            hideConfirm();
            newPet();
            render();
            setMessage(pickMessage('happy'));
        }

        // Updates the message area text with a fade-in animation.
        // The void offsetWidth trick forces a reflow so the CSS animation re-fires
        // even if the same class was already applied.
        function setMessage(text) {
            const el = document.getElementById('msgText');
            el.classList.remove('flash');
            void el.offsetWidth;
            el.textContent = text;
            el.classList.add('flash');
        }

        // Removes any active animation class then re-adds it, triggering a fresh playthrough.
        function triggerAnim(type) {
            const el = document.getElementById('petSvg');
            el.classList.remove('bounce', 'shake', 'sleeping');
            void el.offsetWidth;
            if (type) el.classList.add(type);
        }

        // Shows or hides the floating Zzz elements rendered over the screen while sleeping.
        function setZzz(show) {
            ['z1', 'z2', 'z3'].forEach(id => {
                document.getElementById(id).style.display = show ? 'block' : 'none';
            });
        }

        // Re-renders the entire UI from current state. Called after every state mutation.
        function render() {
            const mood = getMood(state);
            document.getElementById('petSvg').innerHTML = renderPet(traits, mood);
            triggerAnim(state.sleeping ? 'sleeping' : null);
            setZzz(state.sleeping);

            const h = Math.round(state.hunger);
            const hp = Math.round(state.happiness);

            document.getElementById('hungerBar').style.width = h + '%';
            document.getElementById('hungerBar').style.background = statColor(h);
            document.getElementById('hungerVal').textContent = h + '%';

            document.getElementById('happyBar').style.width = hp + '%';
            document.getElementById('happyBar').style.background = statColor(hp);
            document.getElementById('happyVal').textContent = hp + '%';

            const dot = document.getElementById('statusDot');
            dot.className = 'status-dot' + (state.sleeping ? ' sleeping' : (mood === 'critical' ? ' critical' : ''));

            // Toggle sleep button between "Sleep" and "Wake" depending on current state.
            document.getElementById('btnSleep').querySelector('.icon').textContent = state.sleeping ? '☀️' : '💤';
            document.getElementById('sleepLabel').textContent = state.sleeping ? 'Wake' : 'Sleep';

            // Feed and Play are disabled while sleeping, paused, or within the action cooldown window.
            const onActionCooldown = (Date.now() - lastActionTime) / 1000 < ACTION_COOLDOWN_SECONDS;
            document.getElementById('btnFeed').disabled = state.sleeping || paused || onActionCooldown;
            document.getElementById('btnPlay').disabled = state.sleeping || paused || onActionCooldown;
            document.getElementById('btnSleep').disabled = paused;
        }

        // ─── Player actions ──────────────────────────────────────────────────────────

        // Handles the three player-initiated actions. Each action mutates state,
        // sets a contextual message, and resets the cooldown bar so the timer reflects
        // time elapsed since the last meaningful event.
        function doAction(action) {
            if (action === 'feed' && !state.sleeping) {
                state.hunger = clamp(state.hunger + 25, 0, 100);
                setMessage(pickMessage('fed'));
                triggerAnim('bounce');
                lastActionTime = Date.now();
                startCooldown();
            } else if (action === 'play' && !state.sleeping) {
                state.happiness = clamp(state.happiness + 20, 0, 100);
                state.hunger = clamp(state.hunger - 5, 0, 100);   // playing is tiring
                setMessage(pickMessage('played'));
                triggerAnim('bounce');
                lastActionTime = Date.now();
                startCooldown();
            } else if (action === 'sleep') {
                state.sleeping = !state.sleeping;
                setMessage(state.sleeping ? pickMessage('sleeping') : pickMessage('woke'));
                startCooldown();
            }
            render();
        }

        // ─── Game tick ───────────────────────────────────────────────────────────────

        // Called automatically every TICK_SECONDS. Applies passive stat changes and
        // rotates the message to reflect current mood. Stat decay is intentionally
        // small per tick — meaningful change accumulates over several minutes of play.
        function tick() {
            if (!state.sleeping) {
                // Passive decay: hunger drops faster than happiness.
                state.hunger = clamp(state.hunger - (DECAY_RATE_PER_HOUR / 360), 0, 100);
                state.happiness = clamp(state.happiness - (DECAY_RATE_PER_HOUR * 0.8 / 360), 0, 100);

                const mood = getMood(state);
                const category = mood === 'critical' ? 'critical'
                    : mood === 'hungry' ? 'hungry'
                        : mood === 'sad' ? 'sad'
                            : 'happy';
                setMessage(pickMessage(category));
            } else {
                // Passive restore while sleeping. Wakes automatically when both stats are full.
                state.hunger = clamp(state.hunger + (SLEEP_RESTORE_PER_HOUR * 0.5 / 360), 0, 100);
                state.happiness = clamp(state.happiness + (SLEEP_RESTORE_PER_HOUR / 360), 0, 100);

                if (state.hunger >= 95 && state.happiness >= 95) {
                    state.sleeping = false;
                    setMessage(pickMessage('woke'));
                } else {
                    setMessage(pickMessage('sleeping'));
                }
            }
            render();
        }

        // ─── Cooldown bar ────────────────────────────────────────────────────────────

        // The cooldown bar under the message area fills over TICK_SECONDS, giving the
        // player a visible signal that something is about to happen. It's driven by
        // wall-clock time (Date.now delta) rather than a counter so it's immune to
        // interval drift or tab throttling affecting the visual progress.
        let tickStart = Date.now();
        let lastActionTime = 0; // timestamp of last Feed or Play; 0 means no cooldown active

        function startCooldown() {
            tickStart = Date.now();
        }

        function stepCooldown() {
            if (paused) return;
            const elapsed = (Date.now() - tickStart) / 1000;
            const pct = Math.min(elapsed / TICK_SECONDS * 100, 100);
            document.getElementById('cooldownBar').style.width = pct + '%';
            // Re-render during an active action cooldown so buttons re-enable the moment it expires.
            const actionElapsed = (Date.now() - lastActionTime) / 1000;
            if (actionElapsed < ACTION_COOLDOWN_SECONDS) render();
            if (elapsed >= TICK_SECONDS) {
                tickStart = Date.now();
                tick();
            }
        }

        // ─── Init ────────────────────────────────────────────────────────────────────

        newPet();
        render();
        setMessage(pickMessage(getMood(state)));
        startCooldown();
        setInterval(stepCooldown, 250);

    </script>
</body>

</html>
