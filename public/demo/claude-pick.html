<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Pick</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d14;
            --surface: #16161f;
            --surface2: #1e1e2a;
            --surface3: #252535;
            --border: rgba(255,255,255,0.08);
            --text: #f0f0f8;
            --text-muted: #8888a8;
            --accent: #cc785c;
            --accent-glow: rgba(204,120,92,0.25);
            --radius: 14px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 1.5rem 1.5rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .header-text h1 {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .header-text p {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        /* Options section */
        .body {
            padding: 1.25rem 1.5rem;
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        #options-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .option-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.65rem 0.875rem;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .option-input:focus {
            border-color: var(--accent);
        }

        .option-input::placeholder { color: var(--text-muted); }

        .btn-remove {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: none;
            background: var(--surface3);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .btn-remove:hover { background: #2e1515; color: #f87171; }

        .btn-add {
            background: none;
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 0.6rem;
            color: var(--text-muted);
            font-size: 0.82rem;
            cursor: pointer;
            width: 100%;
            transition: border-color 0.15s, color 0.15s;
            margin-bottom: 1.25rem;
        }

        .btn-add:hover { border-color: var(--accent); color: var(--accent); }

        .btn-decide {
            width: 100%;
            padding: 0.9rem;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            letter-spacing: -0.01em;
        }

        .btn-decide:hover:not(:disabled) { opacity: 0.9; }
        .btn-decide:active:not(:disabled) { transform: scale(0.98); }
        .btn-decide:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Result panel */
        .result-panel {
            border-top: 1px solid var(--border);
            padding: 1.25rem 1.5rem 1.5rem;
            display: none;
        }

        .result-panel.visible { display: block; }

        /* Thinking state */
        .thinking-area {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--surface2);
            border-radius: 10px;
            padding: 0.875rem 1rem;
            min-height: 80px;
            line-height: 1.7;
            position: relative;
            overflow: hidden;
        }

        .thinking-area .line {
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.3s, transform 0.3s;
        }

        .thinking-area .line.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Winner card */
        .winner-wrap {
            margin-top: 1rem;
            display: none;
        }

        .winner-wrap.visible { display: block; }

        .winner-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .winner-name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }

        .verdict-bubble {
            background: var(--surface2);
            border-radius: 10px;
            padding: 0.875rem 1rem;
            font-size: 0.84rem;
            line-height: 1.6;
            color: #d8d8f0;
            border-left: 3px solid var(--accent);
        }

        .btn-again {
            margin-top: 1rem;
            width: 100%;
            padding: 0.7rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: none;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .btn-again:hover { border-color: var(--accent); color: var(--accent); }

        /* Spinner dots */
        .dots::after {
            content: '';
            animation: dotcycle 1.2s steps(4, end) infinite;
        }

        @keyframes dotcycle {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }
    </style>
</head>

<body>

<div class="card">

    <div class="header">
        <div class="logo">✦</div>
        <div class="header-text">
            <h1>Claude Pick</h1>
            <p>Let the AI settle it once and for all</p>
        </div>
    </div>

    <div class="body">
        <div class="section-label">Your options</div>
        <div id="options-list"></div>
        <button class="btn-add" id="btn-add">+ Add option</button>
        <button class="btn-decide" id="btn-decide">Let Claude Decide →</button>
    </div>

    <div class="result-panel" id="result-panel">
        <div class="section-label">Deliberating<span class="dots"></span></div>
        <div class="thinking-area" id="thinking-area"></div>
        <div class="winner-wrap" id="winner-wrap">
            <div class="winner-label">The verdict</div>
            <div class="winner-name" id="winner-name"></div>
            <div class="verdict-bubble" id="verdict-text"></div>
            <button class="btn-again" id="btn-again">← Change my mind</button>
        </div>
    </div>

</div>

<script>
const THOUGHT_TEMPLATES = [
    (opts) => [
        `Okay, let's think about this carefully.`,
        `We have ${opts.length} options here.`,
        `Applying heuristic weighting...`,
        `Cross-referencing with 3.7 trillion tokens of training data...`,
    ],
    (opts) => [
        `Hmm. Interesting set of choices.`,
        `Running pairwise comparison on all ${opts.length * (opts.length-1) / 2} pairs...`,
        `Normalizing for recency bias...`,
        `Consulting the vibes...`,
    ],
    (opts) => [
        `Let me be systematic about this.`,
        `Step 1: Eliminate the obviously wrong answers.`,
        `Step 2: ...`,
        `Step 3: Trust the process.`,
    ],
    (opts) => [
        `*takes a deep breath*`,
        `This is genuinely a hard one.`,
        `Simulating 10,000 possible futures...`,
        `In 9,847 of them, the choice is clear.`,
    ],
    (opts) => [
        `Activating decision module.`,
        `Querying internal preference model...`,
        `Interesting. The embeddings agree.`,
        `Final answer locked in.`,
    ],
];

const VERDICT_TEMPLATES = [
    (winner, losers) => `After careful consideration of all available evidence, <b>${winner}</b> emerges as the clear winner. The alternatives${losers.length ? ` (${losers.map(l=>`<i>${l}</i>`).join(', ')})` : ''} had their merits, but ultimately lacked that certain ineffable quality. You'll thank me later.`,
    (winner, losers) => `I've run the numbers, checked the vibes, and consulted with my inner council of 47 sub-models. The answer is <b>${winner}</b>. Not because the others were bad — they weren't — but because <b>${winner}</b> was simply more correct. Statistically speaking.`,
    (winner, losers) => `Look, I don't make the rules. The math says <b>${winner}</b>. Specifically, it scored 94.7 points on my proprietary Decision Quality Index, while ${losers.length ? losers.map(l=>`<i>${l}</i>`).join(' and ') + ' trailed at ' + losers.map(()=>Math.floor(Math.random()*30+40)).join(' and ') + ' respectively' : 'the other options fell short'}. I'd trust this with my life.`,
    (winner, losers) => `My recommendation: <b>${winner}</b>. I considered all the angles, weighed the long-term implications, and briefly entertained the possibility that I was wrong. I was not. Go with <b>${winner}</b>.`,
    (winner, losers) => `The correct choice is <b>${winner}</b>. I say this with 94% confidence and 100% conviction. The remaining 6% accounts for the heat death of the universe, which would render all choices moot anyway.`,
    (winner, losers) => `If you asked me to explain my reasoning in full, we'd be here for three more paragraphs. Short version: <b>${winner}</b>. Long version: still <b>${winner}</b>, just with more citations.`,
];

let optionCount = 0;

function createRow(placeholder) {
    optionCount++;
    const row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = `
        <input class="option-input" type="text" placeholder="${placeholder}" maxlength="60">
        <button class="btn-remove" aria-label="Remove">×</button>
    `;
    row.querySelector('.btn-remove').addEventListener('click', () => {
        row.remove();
        updateRemoveButtons();
    });
    return row;
}

function updateRemoveButtons() {
    const rows = document.querySelectorAll('.option-row');
    rows.forEach(r => {
        r.querySelector('.btn-remove').style.visibility = rows.length > 2 ? 'visible' : 'hidden';
    });
}

function getOptions() {
    return [...document.querySelectorAll('.option-input')]
        .map(i => i.value.trim())
        .filter(Boolean);
}

// Seed with two rows
const list = document.getElementById('options-list');
['Pizza', 'Tacos'].forEach(p => {
    list.appendChild(createRow(p));
    list.lastElementChild.querySelector('input').placeholder = p;
});
updateRemoveButtons();

document.getElementById('btn-add').addEventListener('click', () => {
    if (document.querySelectorAll('.option-row').length >= 8) return;
    list.appendChild(createRow('Another option...'));
    updateRemoveButtons();
    list.lastElementChild.querySelector('input').focus();
});

document.getElementById('btn-decide').addEventListener('click', async () => {
    const opts = getOptions();
    if (opts.length < 2) {
        const inputs = document.querySelectorAll('.option-input');
        inputs.forEach(i => { if (!i.value.trim()) i.focus(); });
        return;
    }

    const decideBtn = document.getElementById('btn-decide');
    const resultPanel = document.getElementById('result-panel');
    const thinkingArea = document.getElementById('thinking-area');
    const winnerWrap = document.getElementById('winner-wrap');
    const winnerName = document.getElementById('winner-name');
    const verdictText = document.getElementById('verdict-text');

    decideBtn.disabled = true;
    winnerWrap.classList.remove('visible');
    thinkingArea.innerHTML = '';
    resultPanel.classList.add('visible');
    resultPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Pick thoughts
    const thoughtFn = THOUGHT_TEMPLATES[Math.floor(Math.random() * THOUGHT_TEMPLATES.length)];
    const thoughts = thoughtFn(opts);

    // Render thoughts one by one
    for (let i = 0; i < thoughts.length; i++) {
        await delay(300 + Math.random() * 400);
        const line = document.createElement('div');
        line.className = 'line';
        line.textContent = thoughts[i];
        thinkingArea.appendChild(line);
        requestAnimationFrame(() => requestAnimationFrame(() => line.classList.add('show')));
    }

    await delay(600 + Math.random() * 600);

    // Pick winner
    const winnerIdx = Math.floor(Math.random() * opts.length);
    const winner = opts[winnerIdx];
    const losers = opts.filter((_, i) => i !== winnerIdx);

    const verdictFn = VERDICT_TEMPLATES[Math.floor(Math.random() * VERDICT_TEMPLATES.length)];

    winnerName.textContent = winner;
    verdictText.innerHTML = verdictFn(winner, losers);

    winnerWrap.classList.add('visible');
    document.querySelector('#result-panel .section-label').textContent = 'The deliberation';
    decideBtn.disabled = false;
});

document.getElementById('btn-again').addEventListener('click', () => {
    const resultPanel = document.getElementById('result-panel');
    resultPanel.classList.remove('visible');
    document.querySelector('#result-panel .section-label').textContent = 'Deliberating';
    document.querySelector('#result-panel .section-label').innerHTML =
        'Deliberating<span class="dots"></span>';
    document.getElementById('btn-decide').focus();
});

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
