<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turing Machine Visualizer</title>
    <style>
        :root {
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            --font-serif: Georgia, 'Times New Roman', serif;
            --color-background-primary: #ffffff;
            --color-background-secondary: #f5f4ef;
            --color-background-tertiary: #eeede8;
            --color-background-info: #e6f1fb;
            --color-background-success: #eaf3de;
            --color-background-warning: #faeeda;
            --color-background-danger: #fcebeb;
            --color-text-primary: #1a1a18;
            --color-text-secondary: #5f5e5a;
            --color-text-tertiary: #888780;
            --color-text-info: #185fa5;
            --color-text-success: #3b6d11;
            --color-text-warning: #854f0b;
            --color-text-danger: #a32d2d;
            --color-border-primary: rgba(0, 0, 0, 0.4);
            --color-border-secondary: rgba(0, 0, 0, 0.3);
            --color-border-tertiary: rgba(0, 0, 0, 0.15);
            --border-radius-md: 8px;
            --border-radius-lg: 12px;
            --border-radius-xl: 16px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-background-primary: #1c1c1a;
                --color-background-secondary: #242422;
                --color-background-tertiary: #2c2c2a;
                --color-background-info: #042c53;
                --color-background-success: #173404;
                --color-background-warning: #412402;
                --color-background-danger: #501313;
                --color-text-primary: #f0ede4;
                --color-text-secondary: #b4b2a9;
                --color-text-tertiary: #888780;
                --color-text-info: #85b7eb;
                --color-text-success: #97c459;
                --color-text-warning: #ef9f27;
                --color-text-danger: #f09595;
                --color-border-primary: rgba(255, 255, 255, 0.4);
                --color-border-secondary: rgba(255, 255, 255, 0.3);
                --color-border-tertiary: rgba(255, 255, 255, 0.15);
            }
        }

        body {
            padding: 0;
            background: var(--color-background-primary);
        }
    </style>
</head>

<body>
    <style>
        h2.sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
        }

        body,
        * {
            box-sizing: border-box;
        }

        .root {
            padding: 1.5rem 0;
            font-family: var(--font-sans);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .prog-label {
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-right: 4px;
        }

        select,
        input[type=text] {
            font-size: 13px;
        }

        .speed-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-left: auto;
        }

        .state-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: var(--border-radius-md);
            background: var(--color-background-secondary);
            border: 0.5px solid var(--color-border-tertiary);
            color: var(--color-text-secondary);
        }

        .state-val {
            font-weight: 500;
            font-size: 15px;
            color: var(--color-text-primary);
        }

        .tape-wrap {
            overflow: hidden;
            margin: 1rem 0;
            position: relative;
            height: 80px;
        }

        .tape-row {
            display: flex;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.22s cubic-bezier(.4, 0, .2, 1);
            height: 80px;
            align-items: center;
            gap: 0;
        }

        .cell {
            width: 52px;
            height: 52px;
            border: 0.5px solid var(--color-border-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-family: var(--font-mono);
            font-weight: 500;
            color: var(--color-text-primary);
            background: var(--color-background-primary);
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }

        .cell.head {
            background: #EEEDFE;
            color: #3C3489;
            border-color: #534AB7;
            border-width: 1.5px;
            z-index: 2;
        }

        .cell.blank {
            color: var(--color-text-tertiary);
        }

        .head-triangle {
            text-align: center;
            font-size: 14px;
            color: #534AB7;
            line-height: 1;
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%) translateX(0px);
            pointer-events: none;
        }

        .head-label {
            font-size: 11px;
            color: #7F77DD;
            text-align: center;
            position: absolute;
            top: 62px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .table-wrap {
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        table {
            border-collapse: collapse;
            font-size: 13px;
            width: 100%;
        }

        th {
            text-align: left;
            padding: 6px 10px;
            color: var(--color-text-secondary);
            font-weight: 500;
            border-bottom: 0.5px solid var(--color-border-secondary);
        }

        td {
            padding: 6px 10px;
            border-bottom: 0.5px solid var(--color-border-tertiary);
            color: var(--color-text-primary);
            font-family: var(--font-mono);
            font-size: 13px;
        }

        tr.active-rule td {
            background: #EEEDFE;
            color: #3C3489;
        }

        .log {
            font-size: 12px;
            color: var(--color-text-secondary);
            min-height: 20px;
            font-family: var(--font-mono);
            margin-top: 8px;
        }

        .halted {
            color: var(--color-text-success);
            font-weight: 500;
        }

        .error {
            color: var(--color-text-danger);
        }

        .step-num {
            font-size: 12px;
            color: var(--color-text-tertiary);
            margin-top: 4px;
        }
    </style>

    <div class="root">
        <h2 class="sr-only">Interactive Turing machine simulator with tape, state display, and transition table</h2>

        <div class="controls">
            <span class="prog-label">Program:</span>
            <select id="prog-select" onchange="loadProgram(this.value)">
                <option value="increment">Increment binary number</option>
                <option value="flip">Flip all bits</option>
                <option value="palindrome">Check palindrome (0/1)</option>
                <option value="copy">Copy a string</option>
            </select>
            <button onclick="reset()">Reset</button>
            <button onclick="step()" id="btn-step">Step</button>
            <button onclick="toggleRun()" id="btn-run">Run</button>
            <div class="speed-wrap">
                <span>Speed</span>
                <input type="range" min="50" max="600" value="300" step="50" id="speed-slider" style="width:80px">
            </div>
        </div>

        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
            <div class="state-badge">State: <span class="state-val" id="state-display">q0</span></div>
            <div class="step-num" id="step-display">Step 0</div>
        </div>

        <div class="tape-wrap" id="tape-wrap">
            <div class="head-triangle" id="head-tri">▼</div>
            <div class="head-label" id="head-lbl">head</div>
            <div class="tape-row" id="tape-row"></div>
        </div>

        <div class="table-wrap">
            <table id="trans-table">
                <thead>
                    <tr>
                        <th>State</th>
                        <th>Read</th>
                        <th>Write</th>
                        <th>Move</th>
                        <th>Next state</th>
                    </tr>
                </thead>
                <tbody id="trans-body"></tbody>
            </table>
        </div>

        <div class="log" id="log-line"></div>
    </div>

    <script>
        const BLANK = '□';
        const PROGRAMS = {
            increment: {
                tape: ['1', '0', '1'],
                start: 0,
                initial: 'q0',
                transitions: [
                    { state: 'q0', read: '0', write: '0', move: 'R', next: 'q0' },
                    { state: 'q0', read: '1', write: '1', move: 'R', next: 'q0' },
                    { state: 'q0', read: BLANK, write: BLANK, move: 'L', next: 'q1' },
                    { state: 'q1', read: '1', write: '0', move: 'L', next: 'q1' },
                    { state: 'q1', read: '0', write: '1', move: 'L', next: 'halt' },
                    { state: 'q1', read: BLANK, write: '1', move: 'R', next: 'halt' },
                ],
                desc: 'Scans right to end, then increments (110 → 111)',
            },
            flip: {
                tape: ['1', '0', '1', '1', '0'],
                start: 0,
                initial: 'q0',
                transitions: [
                    { state: 'q0', read: '0', write: '1', move: 'R', next: 'q0' },
                    { state: 'q0', read: '1', write: '0', move: 'R', next: 'q0' },
                    { state: 'q0', read: BLANK, write: BLANK, move: 'R', next: 'halt' },
                ],
                desc: 'Flips every 0↔1 left to right',
            },
            palindrome: {
                tape: ['1', '0', '1', '0', '1'],
                start: 0,
                initial: 'q0',
                transitions: [
                    { state: 'q0', read: '0', write: 'X', move: 'R', next: 'q1' },
                    { state: 'q0', read: '1', write: 'Y', move: 'R', next: 'q3' },
                    { state: 'q0', read: 'X', write: 'X', move: 'R', next: 'q6' },
                    { state: 'q0', read: 'Y', write: 'Y', move: 'R', next: 'q6' },
                    { state: 'q0', read: BLANK, write: BLANK, move: 'R', next: 'q6' },
                    { state: 'q1', read: '0', write: '0', move: 'R', next: 'q1' },
                    { state: 'q1', read: '1', write: '1', move: 'R', next: 'q1' },
                    { state: 'q1', read: 'X', write: 'X', move: 'R', next: 'q1' },
                    { state: 'q1', read: 'Y', write: 'Y', move: 'R', next: 'q1' },
                    { state: 'q1', read: BLANK, write: BLANK, move: 'L', next: 'q2' },
                    { state: 'q2', read: '0', write: 'X', move: 'L', next: 'q5' },
                    { state: 'q2', read: 'X', write: 'X', move: 'L', next: 'q2' },
                    { state: 'q2', read: 'Y', write: 'Y', move: 'L', next: 'q2' },
                    { state: 'q2', read: '1', write: '1', move: 'R', next: 'reject' },
                    { state: 'q3', read: '0', write: '0', move: 'R', next: 'q3' },
                    { state: 'q3', read: '1', write: '1', move: 'R', next: 'q3' },
                    { state: 'q3', read: 'X', write: 'X', move: 'R', next: 'q3' },
                    { state: 'q3', read: 'Y', write: 'Y', move: 'R', next: 'q3' },
                    { state: 'q3', read: BLANK, write: BLANK, move: 'L', next: 'q4' },
                    { state: 'q4', read: '1', write: 'Y', move: 'L', next: 'q5' },
                    { state: 'q4', read: 'X', write: 'X', move: 'L', next: 'q4' },
                    { state: 'q4', read: 'Y', write: 'Y', move: 'L', next: 'q4' },
                    { state: 'q4', read: '0', write: '0', move: 'R', next: 'reject' },
                    { state: 'q5', read: '0', write: '0', move: 'L', next: 'q5' },
                    { state: 'q5', read: '1', write: '1', move: 'L', next: 'q5' },
                    { state: 'q5', read: 'X', write: 'X', move: 'L', next: 'q5' },
                    { state: 'q5', read: 'Y', write: 'Y', move: 'L', next: 'q5' },
                    { state: 'q5', read: BLANK, write: BLANK, move: 'R', next: 'q0' },
                    { state: 'q6', read: 'X', write: 'X', move: 'R', next: 'q6' },
                    { state: 'q6', read: 'Y', write: 'Y', move: 'R', next: 'q6' },
                    { state: 'q6', read: BLANK, write: BLANK, move: 'R', next: 'accept' },
                    { state: 'reject', read: '0', write: '0', move: 'R', next: 'reject' },
                    { state: 'reject', read: '1', write: '1', move: 'R', next: 'reject' },
                    { state: 'reject', read: BLANK, write: BLANK, move: 'R', next: 'reject' },
                ],
                desc: 'Marks matched pairs; accepts if palindrome',
            },
            copy: {
                tape: ['1', '0', '1'],
                start: 0,
                initial: 'q0',
                transitions: [
                    { state: 'q0', read: '1', write: 'X', move: 'R', next: 'q1' },
                    { state: 'q0', read: '0', write: 'X', move: 'R', next: 'q4' },
                    { state: 'q0', read: BLANK, write: BLANK, move: 'R', next: 'halt' },
                    { state: 'q1', read: '1', write: '1', move: 'R', next: 'q1' },
                    { state: 'q1', read: '0', write: '0', move: 'R', next: 'q1' },
                    { state: 'q1', read: BLANK, write: BLANK, move: 'R', next: 'q2' },
                    { state: 'q2', read: '1', write: '1', move: 'R', next: 'q2' },
                    { state: 'q2', read: '0', write: '0', move: 'R', next: 'q2' },
                    { state: 'q2', read: BLANK, write: '1', move: 'L', next: 'q3' },
                    { state: 'q3', read: '1', write: '1', move: 'L', next: 'q3' },
                    { state: 'q3', read: '0', write: '0', move: 'L', next: 'q3' },
                    { state: 'q3', read: BLANK, write: BLANK, move: 'L', next: 'q3b' },
                    { state: 'q3b', read: '1', write: '1', move: 'L', next: 'q3b' },
                    { state: 'q3b', read: '0', write: '0', move: 'L', next: 'q3b' },
                    { state: 'q3b', read: 'X', write: 'X', move: 'R', next: 'q0' },
                    { state: 'q4', read: '1', write: '1', move: 'R', next: 'q4' },
                    { state: 'q4', read: '0', write: '0', move: 'R', next: 'q4' },
                    { state: 'q4', read: BLANK, write: BLANK, move: 'R', next: 'q5' },
                    { state: 'q5', read: '1', write: '1', move: 'R', next: 'q5' },
                    { state: 'q5', read: '0', write: '0', move: 'R', next: 'q5' },
                    { state: 'q5', read: BLANK, write: '0', move: 'L', next: 'q3' },
                ],
                desc: 'Copies input string (X marks processed cells)',
            },
        };

        let tape = [], head = 0, state = '', running = false, timer = null, stepCount = 0;
        let activeRule = null;
        let prog = 'increment';

        function loadProgram(p) {
            prog = p;
            reset();
        }

        function reset() {
            clearInterval(timer); running = false;
            document.getElementById('btn-run').textContent = 'Run';
            const p = PROGRAMS[prog];
            tape = [...p.tape];
            head = p.start;
            state = p.initial;
            stepCount = 0;
            activeRule = null;
            renderTransTable();
            renderTape();
            document.getElementById('state-display').textContent = state;
            document.getElementById('step-display').textContent = 'Step 0';
            document.getElementById('log-line').textContent = PROGRAMS[prog].desc;
            document.getElementById('log-line').className = 'log';
            document.getElementById('btn-step').disabled = false;
            document.getElementById('btn-run').disabled = false;
        }

        function getCell(i) {
            return tape[i] !== undefined ? tape[i] : BLANK;
        }
        function setCell(i, v) {
            while (tape.length <= i) tape.push(BLANK);
            tape[i] = v;
        }

        function step() {
            if (state === 'halt' || state === 'accept' || state === 'reject') return;
            const read = getCell(head);
            const p = PROGRAMS[prog];
            const rule = p.transitions.find(r => r.state === state && r.read === read);
            if (!rule) {
                setLog('No rule for (' + state + ', ' + read + ') — implicit halt', 'halted');
                state = 'halt';
                document.getElementById('state-display').textContent = state;
                clearInterval(timer); running = false;
                document.getElementById('btn-run').textContent = 'Run';
                highlightRule(null);
                renderTape();
                return;
            }
            setCell(head, rule.write);
            if (rule.move === 'R') head++;
            else if (rule.move === 'L') head--;
            if (head < 0) head = 0;
            state = rule.next;
            stepCount++;
            document.getElementById('state-display').textContent = state;
            document.getElementById('step-display').textContent = 'Step ' + stepCount;
            activeRule = rule;
            highlightRule(rule);
            renderTape();
            if (state === 'halt' || state === 'accept' || state === 'reject') {
                clearInterval(timer); running = false;
                document.getElementById('btn-run').textContent = 'Run';
                const msg = state === 'accept' ? 'Accepted' : state === 'reject' ? 'Rejected' : 'Halted';
                setLog(msg + ' after ' + stepCount + ' steps', state === 'reject' ? 'error' : 'halted');
                document.getElementById('btn-step').disabled = true;
            } else {
                setLog('Read "' + rule.read + '" → write "' + rule.write + '", move ' + rule.move + ', → ' + rule.next, '');
            }
        }

        function setLog(msg, cls) {
            const el = document.getElementById('log-line');
            el.textContent = msg;
            el.className = 'log ' + (cls || '');
        }

        function toggleRun() {
            if (state === 'halt' || state === 'accept' || state === 'reject') return;
            running = !running;
            document.getElementById('btn-run').textContent = running ? 'Pause' : 'Run';
            if (running) {
                const delay = () => 650 - parseInt(document.getElementById('speed-slider').value);
                timer = setInterval(() => {
                    step();
                    if (state === 'halt' || state === 'accept' || state === 'reject') clearInterval(timer);
                }, delay());
            } else {
                clearInterval(timer);
            }
        }

        function renderTape() {
            const row = document.getElementById('tape-row');
            const VISIBLE = 13;
            const half = Math.floor(VISIBLE / 2);
            let cells = '';
            for (let i = head - half; i <= head + half; i++) {
                const v = getCell(i);
                const isHead = i === head;
                const isBlank = v === BLANK;
                cells += `<div class="cell${isHead ? ' head' : ''}${isBlank ? ' blank' : ''}">${v}</div>`;
            }
            row.innerHTML = cells;
        }

        function renderTransTable() {
            const p = PROGRAMS[prog];
            const body = document.getElementById('trans-body');
            body.innerHTML = p.transitions.map((r, i) =>
                `<tr id="rule-${i}">
      <td>${r.state}</td>
      <td>${r.read}</td>
      <td>${r.write}</td>
      <td>${r.move}</td>
      <td>${r.next}</td>
    </tr>`
            ).join('');
        }

        function highlightRule(rule) {
            document.querySelectorAll('#trans-body tr').forEach(tr => tr.classList.remove('active-rule'));
            if (!rule) return;
            const p = PROGRAMS[prog];
            const idx = p.transitions.findIndex(r => r === rule);
            const el = document.getElementById('rule-' + idx);
            if (el) {
                el.classList.add('active-rule');
                el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        loadProgram('increment');
    </script>
</body>

</html>
